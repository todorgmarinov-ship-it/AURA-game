<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and glows -->
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a122c"/>
      <stop offset="100%" stop-color="#050814"/>
    </radialGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00a8ff"/>
    </linearGradient>
    <linearGradient id="neon-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bd00ff"/>
      <stop offset="100%" stop-color="#ff005b"/>
    </linearGradient>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" stroke="url(#neon-cyan)" stroke-width="4" filter="url(#glow-cyan)"/>

  <!-- Outer scanning lines -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(0, 255, 204, 0.15)" stroke-dasharray="10 15" stroke-width="2"/>

  <!-- Eye Symbol (Sensory) -->
  <!-- Outer eyelid -->
  <path d="M 120 256 C 180 150, 332 150, 392 256 C 332 362, 180 362, 120 256 Z" fill="none" stroke="url(#neon-cyan)" stroke-width="12" stroke-linejoin="round" filter="url(#glow-cyan)"/>
  
  <!-- Soundwave Pupil (Audio Substitution) -->
  <g filter="url(#glow-cyan)">
    <!-- Central Soundwave Bars -->
    <rect x="248" y="196" width="16" height="120" rx="8" fill="url(#neon-purple)"/>
    <rect x="216" y="216" width="16" height="80" rx="8" fill="url(#neon-purple)"/>
    <rect x="280" y="216" width="16" height="80" rx="8" fill="url(#neon-purple)"/>
    <rect x="184" y="236" width="16" height="40" rx="8" fill="url(#neon-purple)"/>
    <rect x="312" y="236" width="16" height="40" rx="8" fill="url(#neon-purple)"/>
  </g>

  <!-- Horizontal Scan Line -->
  <line x1="60" y1="256" x2="452" y2="256" stroke="rgba(255, 255, 255, 0.4)" stroke-width="2" stroke-dasharray="8 8"/>
</svg>
